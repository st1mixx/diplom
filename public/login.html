<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вхід — ShopUA</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

  <div class="auth-container">
    <a href="index.html" class="logo auth-logo">🛍️ ShopUA</a>

    <div class="auth-tabs">
      <button class="auth-tab active" id="loginTab" onclick="showTab('login')">Вхід</button>
      <button class="auth-tab" id="registerTab" onclick="showTab('register')">Реєстрація</button>
    </div>

    <div class="auth-form" id="loginForm">
      <h2 class="auth-title">Вхід в акаунт</h2>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="loginEmail" class="form-input" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <input type="password" id="loginPassword" class="form-input" placeholder="Ваш пароль">
      </div>
      <div class="form-error" id="loginError"></div>
      <button class="btn btn-primary btn-full" onclick="login()">Увійти</button>
      <p class="auth-switch">Немає акаунту? <a href="#" onclick="showTab('register')">Зареєструватись</a></p>
    </div>

    <div class="auth-form hidden" id="registerForm">
      <h2 class="auth-title">Створити акаунт</h2>
      <div class="form-group">
        <label class="form-label">Ваше ім'я</label>
        <input type="text" id="registerName" class="form-input" placeholder="Іван Іваненко">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="registerEmail" class="form-input" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <input type="password" id="registerPassword" class="form-input" placeholder="Мінімум 6 символів">
      </div>
      <div class="form-error" id="registerError"></div>
      <button class="btn btn-primary btn-full" onclick="register()">Зареєструватись</button>
      <p class="auth-switch">Вже є акаунт? <a href="#" onclick="showTab('login')">Увійти</a></p>
    </div>

  </div>

  <script src="js/auth.js"></script>
  <script>
    function showTab(tab) {
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('registerForm').classList.add('hidden');
      document.getElementById('loginTab').classList.remove('active');
      document.getElementById('registerTab').classList.remove('active');
      document.getElementById(tab + 'Form').classList.remove('hidden');
      document.getElementById(tab + 'Tab').classList.add('active');
    }
  </script>
</body>
</html>
