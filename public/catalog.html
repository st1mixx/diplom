<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopUA — Інтернет магазин</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="container">
      <a href="index.html" class="logo">🛍️ ShopUA</a>
      <nav class="nav">
        <a href="catalog.html" class="nav-link">Каталог</a>
        <a href="cart.html" class="nav-link">🛒 Кошик <span class="cart-count" id="cartCount">0</span></a>
      </nav>
      <div class="header-auth" id="headerAuth"></div>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <div class="catalog-layout">

        <!-- SIDEBAR З КАТЕГОРІЯМИ -->
        <aside class="sidebar">
          <div class="sidebar-header">
            <div class="sidebar-title">Категорії</div>
          </div>
          <div class="categories" id="categoriesList"></div>
        </aside>

        <!-- ПРАВА ЧАСТИНА -->
        <div class="catalog-right">
          <div class="search-bar">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" class="search-input" placeholder="Пошук товарів...">
          </div>
          <div class="catalog-meta">
            <span id="catalogMeta"></span>
          </div>
          <div class="products-grid" id="productsGrid"></div>
          <div class="pagination" id="pagination"></div>
        </div>

      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2026 ShopUA — Всі права захищені</p>
    </div>
  </footer>

  <script src="js/auth.js"></script>
  <script src="js/catalog.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const category = params.get('category');
    if (category) {
      setTimeout(() => {
        const btn = document.getElementById(`cat-${category}`);
        if (btn) btn.click();
      }, 500);
    }
  });
</script>
</body>
</html>
