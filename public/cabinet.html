<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Особистий кабінет — ShopUA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="container">
      <a href="index.html" class="logo">🛍️ ShopUA</a>
      <nav class="nav">
        <a href="index.html" class="nav-link">Каталог</a>
        <a href="cart.html" class="nav-link">🛒 Кошик <span class="cart-count" id="cartCount">0</span></a>
      </nav>
      <div class="header-auth" id="headerAuth"></div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="cabinet-layout">

        <!-- SIDEBAR -->
        <aside class="cabinet-sidebar">
          <div class="cabinet-user">
            <div class="cabinet-avatar">👤</div>
            <div class="cabinet-name" id="cabinetName">...</div>
            <div class="cabinet-role" id="cabinetRole">...</div>
          </div>
          <div class="cabinet-menu">
            <button class="cabinet-link active" onclick="showSection('orders')">📦 Мої замовлення</button>
            <button class="cabinet-link" onclick="showSection('profile')">👤 Мій профіль</button>
            <button class="cabinet-link" onclick="logout()" style="color:var(--danger)">🚪 Вийти</button>
          </div>
        </aside>

        <!-- КОНТЕНТ -->
        <div class="cabinet-content">

          <!-- ЗАМОВЛЕННЯ -->
          <div id="section-orders">
            <div class="section-title">📦 Мої замовлення</div>
            <div id="ordersList">
              <div style="text-align:center;padding:40px;color:var(--text-3)">⏳ Завантаження...</div>
            </div>
          </div>

          <!-- ПРОФІЛЬ -->
          <div id="section-profile" class="hidden">
            <div class="section-title">👤 Мій профіль</div>
            <div id="profileContent">
              <div style="text-align:center;padding:40px;color:var(--text-3)">⏳ Завантаження...</div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2026 ShopUA — Всі права захищені</p>
    </div>
  </footer>

  <script src="js/auth.js"></script>
  <script src="js/catalog.js"></script>
  <script src="js/cabinet.js"></script>
</body>
</html>
